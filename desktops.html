<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVenta - Desktops</title>
    <style>
        /* Estilos Generales */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #ffffff; }
        
        .container { display: flex; max-width: 1200px; margin: 40px auto; gap: 30px; padding: 0 20px; }

        /* Barra Lateral de Filtros (Sidebar) */
        .sidebar { width: 280px; background-color: #f5f7f9; padding: 25px; border-radius: 5px; height: fit-content; }
        .sidebar h2 { color: #0056b3; font-size: 1.1rem; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        
        .filter-group { margin-bottom: 25px; }
        .filter-group label { display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: #444; }
        
        .filter-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .option { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 8px; color: #555; }
        .option input { cursor: pointer; }

        .btn-update { width: 100%; background-color: #333; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 3px; transition: 0.3s; }
        .btn-update:hover { background-color: #000; }

        .blog-link { display: block; margin-top: 20px; color: #0056b3; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* Sección de Catálogo Desktops */
        .catalog { flex: 1; }
        .catalog h2 { font-size: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-top: 0; margin-bottom: 30px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        /* Tarjeta de Producto (Desktop) */
        .product-card { border: 1px solid #efefef; border-radius: 10px; padding: 20px; text-align: center; transition: box-shadow 0.3s; }
        .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); }

        .img-box { background-color: #f9f9f9; height: 220px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-bottom: 20px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .product-card h3 { font-size: 1.1rem; color: #333; margin: 15px 0 10px 0; }
        .price { color: #28a745; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; }

        .btn-info { width: 100%; background-color: #e9ecef; border: 1px solid #ced4da; padding: 10px; font-weight: bold; color: #495057; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-info:hover { background-color: #dee2e6; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <h2>FILTRAR PRODUCTOS</h2>
            
            <div class="filter-group">
                <label>Rango de Precio:</label>
                <select>
                    <option>Ver todos</option>
                    <option>$5,000 - $10,000</option>
                    <option>$10,000 - $20,000</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Rendimiento:</label>
                <div class="option"><input type="radio" name="rend"> Académico</div>
                <div class="option"><input type="radio" name="rend"> Profesional</div>
            </div>

            <div class="filter-group">
                <label>Nuestras Marcas:</label>
                <div class="option"><input type="checkbox"> TechPro</div>
                <div class="option"><input type="checkbox"> EcoCompute</div>
            </div>

            <button class="btn-update">Actualizar Catálogo</button>
            <a href="#" class="blog-link">Visita nuestro Blog</a>
        </aside>

        <main class="catalog">
            <h2>DESKTOPS DESTACADOS</h2>
            
            <div class="product-grid">
                <div class="product-card">
                    <div class="img-box">
                        <img src="https://img.icons8.com/fluency/200/computer.png" alt="Desktop Pro">
                    </div>
                    <h3>Workstation Pro-Venta V2</h3>
                    <p class="price">$18,900.00</p>
                    <button class="btn-info">VER FICHA TÉCNICA</button>
                </div>

                <div class="product-card">
                    <div class="img-box">
                        <img src="https://img.icons8.com/fluency/200/desktop-computer.png" alt="Desktop Eco">
                    </div>
                    <h3>EcoCompute Slim Tower</h3>
                    <p class="price">$12,450.00</p>
                    <button class="btn-info">VER FICHA TÉCNICA</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
