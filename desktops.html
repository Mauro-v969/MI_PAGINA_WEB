<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVenta - Catálogo Puro</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #ffffff;">

    <div style="display: flex; max-width: 1200px; margin: 40px auto; gap: 30px; padding: 0 20px;">
        
        <!-- Barra Lateral -->
        <aside style="width: 280px; background-color: #f5f7f9; padding: 25px; border-radius: 5px; height: fit-content;">
            <h2 style="color: #0056b3; font-size: 1.1rem; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">FILTRAR PRODUCTOS</h2>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: #444;">Rango de Precio:</label>
                <select style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <option>Ver todos</option>
                    <option>$5,000 - $10,000</option>
                    <option>$10,000 - $20,000</option>
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: #444;">Rendimiento:</label>
                <div style="display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 8px; color: #555;">
                    <input type="radio" name="rend"> Académico
                </div>
                <div style="display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 8px; color: #555;">
                    <input type="radio" name="rend"> Profesional
                </div>
            </div>

            <button style="width: 100%; background-color: #333; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 3px;">
                Actualizar Catálogo
            </button>
            
            <a href="#" style="display: block; margin-top: 20px; color: #0056b3; text-decoration: none; font-weight: bold; font-size: 0.9rem;">Visita nuestro Blog</a>
        </aside>

        <!-- Catálogo -->
        <main style="flex: 1;">
            <h2 style="font-size: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-top: 0; margin-bottom: 30px;">DESKTOPS DESTACADOS</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">
                
                <!-- Producto 1 -->
                <div style="border: 1px solid #efefef; border-radius: 10px; padding: 20px; text-align: center;">
                    <div style="background-color: #fff; height: 220px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-bottom: 20px; overflow: hidden;">
                        <img src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5?auto=format&fit=crop&q=80&w=500" alt="PC 1" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3 style="font-size: 1.1rem; color: #333; margin: 15px 0 10px 0;">Workstation Pro-Venta V2</h3>
                    <p style="color: #28a745; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px;">$18,900.00</p>
                    <button style="width: 100%; background-color: #e9ecef; border: 1px solid #ced4da; padding: 10px; font-weight: bold; color: #495057; cursor: pointer; border-radius: 4px;">VER FICHA TÉCNICA</button>
                </div>

                <!-- Producto 2 -->
                <div style="border: 1px solid #efefef; border-radius: 10px; padding: 20px; text-align: center;">
                    <div style="background-color: #fff; height: 220px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-bottom: 20px; overflow: hidden;">
                        <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=500" alt="PC 2" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3 style="font-size: 1.1rem; color: #333; margin: 15px 0 10px 0;">EcoCompute Slim Tower</h3>
                    <p style="color: #28a745; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px;">$12,450.00</p>
                    <button style="width: 100%; background-color: #e9ecef; border: 1px solid #ced4da; padding: 10px; font-weight: bold; color: #495057; cursor: pointer; border-radius: 4px;">VER FICHA TÉCNICA</button>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
